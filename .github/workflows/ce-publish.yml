name: ce-publish

# 触发:
#   - push 到 master      → :edge + :sha-xxxxxxx
#   - push tag vX.Y.Z     → :vX.Y.Z + :X.Y + :latest
#   - 手动 workflow_dispatch
on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/estel-li/rustdesk-ce/api

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rustdesk-api
        uses: actions/checkout@v4
        with:
          path: rustdesk-api

      - name: Checkout rustdesk-api-web (BuildKit named context)
        uses: actions/checkout@v4
        with:
          repository: estel-li/rustdesk-api-web
          ref: master
          path: rustdesk-api-web

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./rustdesk-api
          file: ./rustdesk-api/deploy/Dockerfile
          build-contexts: |
            api-web=./rustdesk-api-web
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
